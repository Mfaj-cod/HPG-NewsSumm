data:
  train_file: data/enhanced/newssumm_enhanced.json
  # train_file: /kaggle/input/newssumm-data/newssumm_processed.json
  # train_file: /content/sample_data/newssumm-data/newssumm_processed.json
  max_input_length: 2048
  max_target_length: 256
  val_split: 0.01

experiment:
  name: flan_t5_xxl_run_001
  output_dir: results/flan_t5_xxl_run_001

model:
  name: google/flan-t5-xxl
  family: flan_t5
  type: seq2seq

system:
  device: auto

training:
  batch_size: 1
  epochs: 10
  fp16: true
  learning_rate: 1e-5
  seed: 42           
  gradient_accumulation_steps: 8