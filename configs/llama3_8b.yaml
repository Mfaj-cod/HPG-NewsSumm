data:
  train_file: data/enhanced/newssumm_enhanced.json
  # train_file: /kaggle/input/newssumm-data/newssumm_processed.json
  # train_file: /content/sample_data/newssumm-data/newssumm_processed.json
  max_input_length: 4096
  max_target_length: 256
  val_split: 0.01

experiment:
  name: llama3_8b_run_001
  output_dir: results/llama3_8b_run_001

model:
  name: meta-llama/Meta-Llama-3-8B-Instruct
  family: llama3
  type: causal

system:
  device: auto

training:
  batch_size: 1
  epochs: 10
  fp16: true
  learning_rate: 1e-5
  seed: 42
  gradient_accumulation_steps: 8  